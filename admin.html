<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Aesthetic SAU News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #f8f5ef;
      --bg-2:      #f0ebe0;
      --paper:     #ffffff;
      --ink:       #12100d;
      --muted:     #6b6358;
      --muted-2:   #9a9183;
      --line:      #e2ddd2;
      --accent:    #c0341a;
      --accent-h:  #a02a12;
      --green:     #1a7a3a;
      --yellow:    #e0b400;
      --yellow-bg: #fef9e0;
      --blue:      #1a5fa0;
      --blue-bg:   #e8f0fa;
      --shadow:    0 1px 0 rgba(0,0,0,.04), 0 8px 24px -12px rgba(0,0,0,.16);
      --shadow-md: 0 4px 16px -4px rgba(0,0,0,.12);
      --radius:    6px;
      --radius-lg: 12px;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans:  'Inter', 'Hind Siliguri', system-ui, sans-serif;
      --t-fast: .15s cubic-bezier(.4,0,.2,1);
      --t-med:  .28s cubic-bezier(.4,0,.2,1);
      --sidebar-w: 240px;
    }
    [data-theme="dark"] {
      --bg:      #0e0c09; --bg-2: #161310; --paper: #1a1714;
      --ink:     #f0e8d8; --muted: #9a9183; --muted-2: #6b6358;
      --line:    #2c2820; --accent: #e84c2b; --accent-h: #ff6040;
      --green:   #2aaa52; --yellow: #f0c000; --yellow-bg: #1e1800;
      --blue:    #4a9fdf; --blue-bg: #0d1f35;
      --shadow:  0 1px 0 rgba(0,0,0,.2), 0 8px 24px -12px rgba(0,0,0,.5);
      --shadow-md: 0 4px 16px -4px rgba(0,0,0,.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body { font-family: var(--font-sans); background: var(--bg); color: var(--ink); min-height: 100vh; }

    /* ── Login Screen ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--bg);
    }
    .login-card {
      background: var(--paper); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md); padding: 48px 40px; text-align: center;
      max-width: 380px; width: 90%;
    }
    .login-card .logo {
      font-family: var(--font-serif); font-size: 22px; font-weight: 900;
      color: var(--accent); letter-spacing: -.5px; margin-bottom: 6px;
    }
    .login-card .logo span { color: var(--ink); }
    .login-card p { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 20px; border-radius: var(--radius);
      border: 1.5px solid var(--line); background: var(--paper); color: var(--ink);
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
    }
    .btn-google:hover { border-color: var(--accent); box-shadow: var(--shadow); }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }
    .login-error { color: var(--accent); font-size: 12px; margin-top: 12px; display: none; }

    /* ── App Shell ── */
    #app { display: none; }
    #app.visible { display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); background: var(--paper); border-right: 1px solid var(--line);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0;
      height: 100vh; z-index: 100; overflow-y: auto;
    }
    .sidebar-logo {
      padding: 20px 20px 16px; border-bottom: 1px solid var(--line);
      font-family: var(--font-serif); font-size: 16px; font-weight: 900;
    }
    .sidebar-logo span { color: var(--accent); }
    .sidebar-logo small { display: block; font-family: var(--font-sans); font-size: 10px;
      font-weight: 500; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 2px; }
    .sidebar-nav { padding: 12px 0; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 20px;
      font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer;
      transition: background var(--t-fast), color var(--t-fast);
      border-radius: 0; text-decoration: none; border: none; background: none;
      width: 100%; text-align: left; font-family: inherit;
    }
    .nav-item:hover { background: var(--bg-2); color: var(--ink); }
    .nav-item.active { background: var(--bg-2); color: var(--accent); font-weight: 600; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .7; }
    .nav-item.active svg { opacity: 1; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--line); }
    .user-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: var(--bg-2); }
    .user-name { font-size: 12px; font-weight: 600; line-height: 1.2; }
    .user-email { font-size: 10px; color: var(--muted); }
    .btn-signout {
      width: 100%; padding: 7px 12px; border-radius: var(--radius); border: 1px solid var(--line);
      background: none; color: var(--muted); font-size: 12px; cursor: pointer; font-family: inherit;
      transition: all var(--t-fast);
    }
    .btn-signout:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main Content ── */
    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar {
      background: var(--paper); border-bottom: 1px solid var(--line);
      padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar h1 { font-size: 16px; font-weight: 700; }
    .topbar-actions { display: flex; gap: 10px; align-items: center; }
    .content { padding: 28px; flex: 1; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
      border-radius: var(--radius); border: none; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all var(--t-fast); text-decoration: none;
    }
    .btn svg { width: 14px; height: 14px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-secondary { background: var(--bg-2); color: var(--ink); border: 1px solid var(--line); }
    .btn-secondary:hover { border-color: var(--muted-2); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover { opacity: .9; }
    .btn-danger { background: transparent; color: var(--accent); border: 1px solid var(--line); }
    .btn-danger:hover { border-color: var(--accent); background: #fff0ee; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ── Dashboard View ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--paper); border-radius: var(--radius-lg); padding: 20px;
      box-shadow: var(--shadow); border: 1px solid var(--line);
    }
    .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; font-family: var(--font-serif); color: var(--ink); }
    .stat-card .sublabel { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Article List ── */
    .articles-table { background: var(--paper); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; border: 1px solid var(--line); }
    .table-header { display: grid; grid-template-columns: 1fr 120px 100px 110px 90px; gap: 12px; padding: 10px 20px; background: var(--bg-2); border-bottom: 1px solid var(--line); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 600; }
    .article-row { display: grid; grid-template-columns: 1fr 120px 100px 110px 90px; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--line); align-items: center; transition: background var(--t-fast); }
    .article-row:last-child { border-bottom: none; }
    .article-row:hover { background: var(--bg); }
    .article-title-cell { font-size: 13px; font-weight: 600; line-height: 1.3; }
    .article-title-cell small { display: block; color: var(--muted); font-size: 11px; font-weight: 400; margin-top: 2px; }
    .badge {
      display: inline-block; padding: 3px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    }
    .badge-published { background: #d4f0de; color: #1a7a3a; }
    .badge-draft { background: var(--yellow-bg); color: #a07800; }
    .row-actions { display: flex; gap: 6px; }
    .empty-state { padding: 60px 20px; text-align: center; color: var(--muted); }
    .empty-state svg { width: 40px; height: 40px; opacity: .3; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; }

    /* ── Editor ── */
    .editor-layout { display: grid; grid-template-columns: 1fr 300px; gap: 24px; align-items: start; }
    .editor-main { display: flex; flex-direction: column; gap: 16px; }
    .editor-sidebar { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 80px; }
    .card { background: var(--paper); border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid var(--line); overflow: hidden; }
    .card-header { padding: 14px 20px; border-bottom: 1px solid var(--line); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .card-body { padding: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .06em; }
    input[type="text"], input[type="url"], select, textarea {
      width: 100%; padding: 9px 12px; border-radius: var(--radius);
      border: 1.5px solid var(--line); background: var(--bg); color: var(--ink);
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color var(--t-fast);
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); background: var(--paper); }
    textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
    #title-input { font-size: 18px; font-weight: 700; font-family: var(--font-serif); }
    #body-input { min-height: 320px; font-size: 14px; line-height: 1.8; }

    /* ── Image Upload ── */
    .image-upload-area {
      border: 2px dashed var(--line); border-radius: var(--radius); padding: 24px;
      text-align: center; cursor: pointer; transition: all var(--t-fast); position: relative;
    }
    .image-upload-area:hover, .image-upload-area.drag-over { border-color: var(--accent); background: #fff5f3; }
    .image-upload-area svg { width: 32px; height: 32px; color: var(--muted-2); margin-bottom: 8px; }
    .image-upload-area p { font-size: 12px; color: var(--muted); }
    .image-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .image-preview { position: relative; border-radius: var(--radius); overflow: hidden; }
    .image-preview img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .image-preview-remove {
      position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.6);
      color: #fff; border: none; border-radius: 50%; width: 28px; height: 28px;
      cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .upload-progress { margin-top: 10px; }
    .progress-bar { height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .2s; }
    .progress-text { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--ink); color: var(--bg); padding: 10px 20px; border-radius: 24px;
      font-size: 13px; font-weight: 500; z-index: 9999; transition: transform .3s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--accent); }

    /* ── Loading ── */
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Delete Confirm ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; display: flex; align-items: center; justify-content: center; display: none; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--paper); border-radius: var(--radius-lg); padding: 28px; max-width: 380px; width: 90%; box-shadow: var(--shadow-md); }
    .modal h3 { font-size: 16px; margin-bottom: 8px; }
    .modal p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .editor-layout { grid-template-columns: 1fr; }
      .editor-sidebar { position: static; }
      .table-header, .article-row { grid-template-columns: 1fr 80px 80px; }
      .table-header > *:nth-child(3), .article-row > *:nth-child(3),
      .table-header > *:nth-child(4), .article-row > *:nth-child(4) { display: none; }
    }
    @media (max-width: 600px) {
      .sidebar { transform: translateX(-100%); transition: transform var(--t-med); }
      .sidebar.open { transform: none; }
      .main { margin-left: 0; }
    }

    /* ── Theme Toggle ── */
    .theme-toggle { background: none; border: 1px solid var(--line); border-radius: var(--radius); padding: 6px 8px; cursor: pointer; color: var(--muted); display: flex; align-items: center; }
    .theme-toggle:hover { color: var(--ink); }
  </style>
</head>
<body>

<!-- ═══════════════════════ FIREBASE SDK ═══════════════════════ -->

<script>
  // ── Allowed admin emails ────────────────────────────────────────────────────
  const ADMIN_EMAILS = [
    'moniruzzamanmoonna@gmail.com',
    // add more admin emails here if needed
  ];

  const CATEGORIES = ['Campus','Bangladesh','Satire','Opinion','Tech','Sports','Culture','Feature'];

  // ── Refs ────────────────────────────────────────────────────────────────────
  const adminDb      = SAU.firebase.db;
  const adminAuth    = SAU.firebase.auth;
  const adminSignIn  = SAU.firebase.signInWithGoogle;
  const adminSignOut = SAU.firebase.signOut;
  const uploadImage  = SAU.cloudinary.upload;

  let currentUser = null;
  let editingId   = null;
  let deleteTargetId = null;
  let allArticles    = [];

  // ── Toast ───────────────────────────────────────────────────────────────────
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  // ── Theme ───────────────────────────────────────────────────────────────────
  const html = document.documentElement;
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('sau-admin-theme', isDark ? 'light' : 'dark');
  });
  const savedTheme = localStorage.getItem('sau-admin-theme');
  if (savedTheme) html.setAttribute('data-theme', savedTheme);

  // ── Auth ────────────────────────────────────────────────────────────────────
  document.getElementById('btn-google-login').addEventListener('click', async () => {
    const btn = document.getElementById('btn-google-login');
    const err = document.getElementById('login-error');
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    btn.disabled = true;
    err.style.display = 'none';
    try {
      await adminSignIn();
    } catch (e) {
      err.textContent = e.message;
      err.style.display = 'block';
      btn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Sign in with Google`;
      btn.disabled = false;
    }
  });

  document.getElementById('btn-signout').addEventListener('click', async () => {
    await adminSignOut();
  });

  adminAuth.onAuthStateChanged(async (user) => {
    if (!user) {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app').classList.remove('visible');
      currentUser = null;
      return;
    }
    if (!ADMIN_EMAILS.includes(user.email)) {
      await adminSignOut();
      const err = document.getElementById('login-error');
      err.textContent = 'Access denied. This email is not authorized.';
      err.style.display = 'block';
      const btn = document.getElementById('btn-google-login');
      btn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Sign in with Google`;
      btn.disabled = false;
      return;
    }
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('user-name').textContent = user.displayName || 'Admin';
    document.getElementById('user-email').textContent = user.email;
    document.getElementById('user-avatar').src = user.photoURL || '';
    showView('dashboard');
  });

  // ── Navigation ───────────────────────────────────────────────────────────────
  document.querySelectorAll('[data-view]').forEach(el => {
    el.addEventListener('click', () => showView(el.dataset.view));
  });

  function showView(view) {
    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.toggle('active', n.dataset.view === view);
    });
    const titles = { dashboard: 'Dashboard', articles: 'All Articles', 'new-article': 'New Article' };
    document.getElementById('topbar-title').textContent = titles[view] || 'Admin';
    document.getElementById('topbar-new-btn').style.display = view === 'new-article' ? 'none' : '';

    const content = document.getElementById('content');
    if (view === 'dashboard') renderDashboard(content);
    else if (view === 'articles') renderArticleList(content);
    else if (view === 'new-article') { editingId = null; renderEditor(content); }
  }

  // ── Dashboard ────────────────────────────────────────────────────────────────
  async function renderDashboard(el) {
    el.innerHTML = `<div class="stats-grid">
      <div class="stat-card"><div class="label">Total Articles</div><div class="value" id="stat-total">—</div></div>
      <div class="stat-card"><div class="label">Published</div><div class="value" id="stat-published">—</div></div>
      <div class="stat-card"><div class="label">Drafts</div><div class="value" id="stat-drafts">—</div></div>
    </div>
    <div class="articles-table">
      <div class="table-header"><div>Recent Articles</div><div>Category</div><div>Status</div><div>Date</div><div>Actions</div></div>
      <div id="recent-list"><div class="empty-state"><p>Loading...</p></div></div>
    </div>`;
    loadArticles('recent-list', 5);
    loadStats();
  }

  async function loadStats() {
    try {
      const snap = await adminDb.collection('articles').get();
      const all = snap.docs.map(d => d.data());
      document.getElementById('stat-total').textContent = all.length;
      document.getElementById('stat-published').textContent = all.filter(a => a.status === 'published').length;
      document.getElementById('stat-drafts').textContent = all.filter(a => a.status === 'draft').length;
    } catch(e) { console.error(e); }
  }

  // ── Article List ─────────────────────────────────────────────────────────────
  async function renderArticleList(el) {
    el.innerHTML = `<div class="articles-table">
      <div class="table-header"><div>Title</div><div>Category</div><div>Status</div><div>Date</div><div>Actions</div></div>
      <div id="all-articles-list"><div class="empty-state"><p>Loading...</p></div></div>
    </div>`;
    loadArticles('all-articles-list');
  }

  async function loadArticles(containerId, limit = 0) {
    const container = document.getElementById(containerId);
    if (!container) return;
    try {
      let query = adminDb.collection('articles').orderBy('createdAt', 'desc');
      if (limit) query = query.limit(limit);
      const snap = await query.get();
      allArticles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (!allArticles.length) {
        container.innerHTML = `<div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <p>No articles yet. <button class="btn btn-primary btn-sm" style="margin-top:10px" data-view="new-article">Write your first article</button></p>
        </div>`;
        container.querySelector('[data-view]')?.addEventListener('click', e => showView(e.target.dataset.view));
        return;
      }
      container.innerHTML = allArticles.map(a => {
        const date = a.createdAt?.toDate ? a.createdAt.toDate().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) : '—';
        return `<div class="article-row">
          <div class="article-title-cell">${escHtml(a.title || 'Untitled')}<small>${escHtml(a.excerpt || '')}</small></div>
          <div><span style="font-size:11px;color:var(--muted)">${escHtml(a.category || '—')}</span></div>
          <div><span class="badge ${a.status === 'published' ? 'badge-published' : 'badge-draft'}">${a.status || 'draft'}</span></div>
          <div style="font-size:11px;color:var(--muted)">${date}</div>
          <div class="row-actions">
            <button class="btn btn-secondary btn-sm" onclick="editArticle('${a.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="confirmDelete('${a.id}')">Del</button>
          </div>
        </div>`;
      }).join('');
    } catch(e) {
      container.innerHTML = `<div class="empty-state"><p>Error loading articles: ${e.message}</p></div>`;
    }
  }

  // ── Editor ───────────────────────────────────────────────────────────────────
  let coverImageUrl = '';
  let coverPublicId = '';

  async function renderEditor(el, article = null) {
    coverImageUrl = article?.coverImage || '';
    coverPublicId = article?.coverPublicId || '';

    el.innerHTML = `
    <div class="editor-layout">
      <div class="editor-main">
        <div class="card">
          <div class="card-body" style="padding:20px">
            <div class="form-group">
              <input type="text" id="title-input" placeholder="Article title…" value="${escHtml(article?.title || '')}" />
            </div>
            <div class="form-group" style="margin-bottom:0">
              <textarea id="body-input" placeholder="Write your article here…">${escHtml(article?.body || '')}</textarea>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">Excerpt</div>
          <div class="card-body">
            <textarea id="excerpt-input" rows="2" placeholder="Short summary (shown in previews)…">${escHtml(article?.excerpt || '')}</textarea>
          </div>
        </div>
      </div>
      <div class="editor-sidebar">
        <div class="card">
          <div class="card-header">Publish</div>
          <div class="card-body">
            <div class="form-group">
              <label>Status</label>
              <select id="status-select">
                <option value="draft" ${(!article || article.status === 'draft') ? 'selected' : ''}>Draft</option>
                <option value="published" ${article?.status === 'published' ? 'selected' : ''}>Published</option>
              </select>
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-secondary" style="flex:1" id="btn-save-draft">Save Draft</button>
              <button class="btn btn-success" style="flex:1" id="btn-publish">Publish</button>
            </div>
            ${editingId ? `<button class="btn btn-danger" style="width:100%;margin-top:8px" onclick="confirmDelete('${editingId}')">Delete Article</button>` : ''}
          </div>
        </div>
        <div class="card">
          <div class="card-header">Category & Tags</div>
          <div class="card-body">
            <div class="form-group">
              <label>Category</label>
              <select id="category-select">
                <option value="">Select category…</option>
                ${CATEGORIES.map(c => `<option value="${c}" ${article?.category === c ? 'selected' : ''}>${c}</option>`).join('')}
              </select>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label>Tags (comma separated)</label>
              <input type="text" id="tags-input" placeholder="campus, satire, food…" value="${escHtml((article?.tags || []).join(', '))}" />
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">Cover Image</div>
          <div class="card-body">
            <div id="cover-image-container">
              ${coverImageUrl
                ? `<div class="image-preview">
                    <img src="${coverImageUrl}" alt="Cover" />
                    <button class="image-preview-remove" id="remove-cover">×</button>
                  </div>`
                : `<div class="image-upload-area" id="upload-area">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <p>Click or drag to upload<br><small>JPG, PNG, WebP</small></p>
                    <input type="file" id="cover-file-input" accept="image/*" />
                  </div>
                  <div class="upload-progress" id="upload-progress" style="display:none">
                    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
                    <div class="progress-text" id="progress-text">Uploading…</div>
                  </div>`
              }
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">SEO</div>
          <div class="card-body">
            <div class="form-group" style="margin-bottom:0">
              <label>Slug (URL)</label>
              <input type="text" id="slug-input" placeholder="auto-generated-from-title" value="${escHtml(article?.slug || '')}" />
            </div>
          </div>
        </div>
      </div>
    </div>`;

    // Auto-slug from title
    document.getElementById('title-input').addEventListener('input', e => {
      const slugEl = document.getElementById('slug-input');
      if (!editingId || !slugEl.value) {
        slugEl.value = slugify(e.target.value);
      }
    });

    // File upload
    setupFileUpload();

    // Buttons
    document.getElementById('btn-save-draft').addEventListener('click', () => saveArticle('draft'));
    document.getElementById('btn-publish').addEventListener('click', () => saveArticle('published'));
  }

  function setupFileUpload() {
    const container = document.getElementById('cover-image-container');
    if (!container) return;

    const removeBtn = container.querySelector('#remove-cover');
    if (removeBtn) {
      removeBtn.addEventListener('click', () => {
        coverImageUrl = '';
        coverPublicId = '';
        container.innerHTML = `<div class="image-upload-area" id="upload-area">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p>Click or drag to upload<br><small>JPG, PNG, WebP</small></p>
          <input type="file" id="cover-file-input" accept="image/*" />
        </div>
        <div class="upload-progress" id="upload-progress" style="display:none">
          <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
          <div class="progress-text" id="progress-text">Uploading…</div>
        </div>`;
        setupFileUpload();
      });
      return;
    }

    const fileInput = document.getElementById('cover-file-input');
    if (!fileInput) return;

    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) handleFileUpload(file);
    });

    const uploadArea = document.getElementById('upload-area');
    if (uploadArea) {
      uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
      uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
      uploadArea.addEventListener('drop', e => {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleFileUpload(file);
      });
    }
  }

  async function handleFileUpload(file) {
    const progress = document.getElementById('upload-progress');
    const fill = document.getElementById('progress-fill');
    const text = document.getElementById('progress-text');
    const area = document.getElementById('upload-area');
    if (area) area.style.opacity = '.5';
    if (progress) progress.style.display = 'block';

    try {
      const result = await uploadImage(file, {}, (pct) => {
        if (fill) fill.style.width = pct + '%';
        if (text) text.textContent = `Uploading… ${pct}%`;
      });
      coverImageUrl = result.url;
      coverPublicId = result.publicId;

      const container = document.getElementById('cover-image-container');
      container.innerHTML = `<div class="image-preview">
        <img src="${coverImageUrl}" alt="Cover" />
        <button class="image-preview-remove" id="remove-cover">×</button>
      </div>`;
      setupFileUpload();
      showToast('Image uploaded ✓', 'success');
    } catch(e) {
      showToast('Upload failed: ' + e.message, 'error');
      if (area) area.style.opacity = '1';
      if (progress) progress.style.display = 'none';
    }
  }

  // ── Save Article ─────────────────────────────────────────────────────────────
  async function saveArticle(status) {
    const title    = document.getElementById('title-input')?.value.trim();
    const body     = document.getElementById('body-input')?.value.trim();
    const excerpt  = document.getElementById('excerpt-input')?.value.trim();
    const category = document.getElementById('category-select')?.value;
    const tagsRaw  = document.getElementById('tags-input')?.value;
    const slug     = document.getElementById('slug-input')?.value.trim() || slugify(title);

    if (!title) { showToast('Title is required', 'error'); return; }

    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

    const btn = status === 'published'
      ? document.getElementById('btn-publish')
      : document.getElementById('btn-save-draft');
    const origText = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;

    const data = {
      title, body, excerpt, category, tags, slug, status,
      coverImage:    coverImageUrl || '',
      coverPublicId: coverPublicId || '',
      authorName:    currentUser.displayName || 'Admin',
      authorEmail:   currentUser.email,
      updatedAt:     firebase.firestore.FieldValue.serverTimestamp(),
    };

    try {
      if (editingId) {
        await adminDb.collection('articles').doc(editingId).update(data);
        showToast(status === 'published' ? 'Article published ✓' : 'Draft saved ✓', 'success');
      } else {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        data.views = 0;
        data.loves = 0;
        const ref = await adminDb.collection('articles').add(data);
        editingId = ref.id;
        showToast(status === 'published' ? 'Article published ✓' : 'Draft saved ✓', 'success');
      }

      // Update homepage data flag
      await adminDb.collection('siteConfig').doc('lastUpdated').set({
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        by: currentUser.email,
      }, { merge: true });

    } catch(e) {
      showToast('Error: ' + e.message, 'error');
    } finally {
      btn.innerHTML = origText;
      btn.disabled = false;
    }
  }

  // ── Edit Article ─────────────────────────────────────────────────────────────
  async function editArticle(id) {
    editingId = id;
    document.getElementById('topbar-title').textContent = 'Edit Article';
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const content = document.getElementById('content');
    content.innerHTML = '<div class="empty-state"><p>Loading article…</p></div>';
    try {
      const snap = await adminDb.collection('articles').doc(id).get();
      if (!snap.exists) { showToast('Article not found', 'error'); return; }
      const article = { id: snap.id, ...snap.data() };
      renderEditor(content, article);
    } catch(e) {
      showToast('Error loading: ' + e.message, 'error');
    }
  }

  // ── Delete ───────────────────────────────────────────────────────────────────
  function confirmDelete(id) {
    deleteTargetId = id;
    document.getElementById('delete-modal').classList.add('open');
  }

  document.getElementById('cancel-delete').addEventListener('click', () => {
    document.getElementById('delete-modal').classList.remove('open');
    deleteTargetId = null;
  });

  document.getElementById('confirm-delete').addEventListener('click', async () => {
    if (!deleteTargetId) return;
    const btn = document.getElementById('confirm-delete');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;
    try {
      await adminDb.collection('articles').doc(deleteTargetId).delete();
      document.getElementById('delete-modal').classList.remove('open');
      showToast('Article deleted', 'success');
      deleteTargetId = null;
      if (editingId === deleteTargetId) { editingId = null; showView('articles'); }
      else showView('articles');
    } catch(e) {
      showToast('Delete failed: ' + e.message, 'error');
      btn.innerHTML = 'Delete';
      btn.disabled = false;
    }
  });

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function slugify(text) {
    return (text || '').toLowerCase().trim()
      .replace(/[^\w\s-]/g, '').replace(/[\s_-]+/g, '-').replace(/^-+|-+$/g, '');
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Expose for inline onclick handlers
  window.editArticle = editArticle;
  window.confirmDelete = confirmDelete;
</script>
</body>
</html>
