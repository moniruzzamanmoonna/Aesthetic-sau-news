<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Aesthetic SAU News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#f8f5ef;--bg-2:#f0ebe0;--paper:#fff;--ink:#12100d;
      --muted:#6b6358;--muted-2:#9a9183;--line:#e2ddd2;
      --accent:#c0341a;--accent-h:#a02a12;
      --green:#1a7a3a;--yellow:#e0b400;--yellow-bg:#fef9e0;
      --blue:#1a5fa0;--blue-bg:#e8f0fa;
      --purple:#6a3a9a;--purple-bg:#f0e8fa;
      --shadow:0 1px 0 rgba(0,0,0,.04),0 8px 24px -12px rgba(0,0,0,.16);
      --shadow-md:0 4px 16px -4px rgba(0,0,0,.12);
      --radius:6px;--radius-lg:12px;
      --font-serif:'Playfair Display',Georgia,serif;
      --font-sans:'Inter','Hind Siliguri',system-ui,sans-serif;
      --t-fast:.15s cubic-bezier(.4,0,.2,1);
      --sidebar-w:240px;
    }
    [data-theme="dark"] {
      --bg:#0e0c09;--bg-2:#161310;--paper:#1a1714;
      --ink:#f0e8d8;--muted:#9a9183;--muted-2:#6b6358;
      --line:#2c2820;--accent:#e84c2b;--accent-h:#ff6040;
      --green:#2aaa52;--yellow:#f0c000;--yellow-bg:#1e1800;
      --blue:#4a9fdf;--blue-bg:#0d1f35;
      --purple:#aa7adf;--purple-bg:#1a0f2a;
      --shadow:0 1px 0 rgba(0,0,0,.2),0 8px 24px -12px rgba(0,0,0,.5);
      --shadow-md:0 4px 16px -4px rgba(0,0,0,.4);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:15px;}
    body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);min-height:100vh;}
    a{color:inherit;text-decoration:none;}

    /* ── Screens ── */
    .screen{display:none;align-items:center;justify-content:center;min-height:100vh;}
    .screen.active{display:flex;}

    /* Gate */
    #screen-gate .inner{text-align:center;}
    .gate-logo{font-family:var(--font-serif);font-size:24px;font-weight:900;color:var(--accent);margin-bottom:20px;}
    .gate-logo span{color:var(--ink);}
    .gate-spin{display:inline-block;width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}

    /* Login */
    .login-card{background:var(--paper);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:48px 40px;text-align:center;max-width:400px;width:90%;}
    .login-logo{font-family:var(--font-serif);font-size:22px;font-weight:900;color:var(--accent);margin-bottom:4px;}
    .login-logo span{color:var(--ink);}
    .login-sub{color:var(--muted);font-size:13px;margin-bottom:32px;}
    .btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 20px;border-radius:var(--radius);border:1.5px solid var(--line);background:var(--paper);color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:border-color var(--t-fast),box-shadow var(--t-fast);}
    .btn-google:hover{border-color:var(--accent);box-shadow:var(--shadow);}
    .btn-google svg{width:20px;height:20px;flex-shrink:0;}
    .login-err{color:var(--accent);font-size:12px;margin-top:12px;min-height:16px;}

    /* Unauth */
    .unauth-card{background:var(--paper);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:48px 40px;text-align:center;max-width:400px;width:90%;}
    .unauth-icon{font-size:52px;margin-bottom:16px;}
    .unauth-card h2{font-size:20px;margin-bottom:10px;}
    .unauth-card p{color:var(--muted);font-size:13px;margin-bottom:24px;}

    /* ── App shell (hidden until auth OK) ── */
    #app{display:none;min-height:100vh;}
    #app.on{display:flex;}

    /* Sidebar */
    .sidebar{width:var(--sidebar-w);background:var(--paper);border-right:1px solid var(--line);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow-y:auto;}
    .sb-logo{padding:20px 20px 16px;border-bottom:1px solid var(--line);font-family:var(--font-serif);font-size:16px;font-weight:900;}
    .sb-logo span{color:var(--accent);}
    .sb-logo small{display:block;font-family:var(--font-sans);font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
    .sb-nav{padding:12px 0;flex:1;}
    .nav-label{padding:12px 20px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted-2);}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:background var(--t-fast),color var(--t-fast);border:none;background:none;width:100%;text-align:left;font-family:inherit;text-decoration:none;}
    .nav-item:hover{background:var(--bg-2);color:var(--ink);}
    .nav-item.active{background:var(--bg-2);color:var(--accent);font-weight:600;}
    .nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.7;}
    .nav-item.active svg{opacity:1;}
    .sb-footer{padding:16px 20px;border-top:1px solid var(--line);}
    .sb-user{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .sb-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--bg-2);flex-shrink:0;}
    .sb-name{font-size:12px;font-weight:600;line-height:1.2;}
    .sb-email{font-size:10px;color:var(--muted);line-height:1.4;word-break:break-all;}
    .role-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-top:3px;}
    .btn-signout{width:100%;padding:7px 12px;border-radius:var(--radius);border:1px solid var(--line);background:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;transition:all var(--t-fast);display:flex;align-items:center;justify-content:center;gap:6px;}
    .btn-signout:hover{border-color:var(--accent);color:var(--accent);}

    /* Main */
    .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}
    .topbar{background:var(--paper);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    .topbar h1{font-size:16px;font-weight:700;}
    .topbar-right{display:flex;gap:10px;align-items:center;}
    .content{padding:28px;flex:1;}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all var(--t-fast);text-decoration:none;}
    .btn svg{width:14px;height:14px;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{background:var(--accent-h);}
    .btn-secondary{background:var(--bg-2);color:var(--ink);border:1px solid var(--line);}
    .btn-secondary:hover{border-color:var(--muted-2);}
    .btn-success{background:var(--green);color:#fff;}
    .btn-success:hover{opacity:.9;}
    .btn-danger{background:transparent;color:var(--accent);border:1px solid var(--line);}
    .btn-danger:hover{border-color:var(--accent);background:#fff0ee;}
    .btn-sm{padding:5px 10px;font-size:12px;}

    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px;}
    .stat-card{background:var(--paper);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);border:1px solid var(--line);}
    .stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;}
    .stat-val{font-size:28px;font-weight:700;font-family:var(--font-serif);}
    .stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}

    /* Table */
    .tbl{background:var(--paper);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--line);}
    .tbl-head{display:grid;gap:12px;padding:10px 20px;background:var(--bg-2);border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;}
    .tbl-row{display:grid;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);align-items:center;transition:background var(--t-fast);}
    .tbl-row:last-child{border-bottom:none;}
    .tbl-row:hover{background:var(--bg);}
    .art-cols{grid-template-columns:1fr 120px 100px 110px 90px;}
    .usr-cols{grid-template-columns:40px 1fr 160px 110px 80px;}
    .cell-title{font-size:13px;font-weight:600;line-height:1.3;}
    .cell-title small{display:block;color:var(--muted);font-size:11px;font-weight:400;margin-top:2px;}
    .row-actions{display:flex;gap:6px;}
    .badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
    .badge-published{background:#d4f0de;color:#1a7a3a;}
    .badge-draft{background:var(--yellow-bg);color:#a07800;}
    .empty{padding:60px 20px;text-align:center;color:var(--muted);font-size:13px;}

    /* Editor */
    .ed-layout{display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:start;}
    .ed-main{display:flex;flex-direction:column;gap:16px;}
    .ed-side{display:flex;flex-direction:column;gap:16px;position:sticky;top:80px;}
    .card{background:var(--paper);border-radius:var(--radius-lg);box-shadow:var(--shadow);border:1px solid var(--line);overflow:hidden;}
    .card-hd{padding:14px 20px;border-bottom:1px solid var(--line);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
    .card-bd{padding:20px;}
    .fg{margin-bottom:16px;}
    .fg:last-child{margin-bottom:0;}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}
    input[type=text],input[type=url],select,textarea{width:100%;padding:9px 12px;border-radius:var(--radius);border:1.5px solid var(--line);background:var(--bg);color:var(--ink);font-size:14px;font-family:inherit;outline:none;transition:border-color var(--t-fast);}
    input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--paper);}
    textarea{resize:vertical;min-height:120px;line-height:1.6;}
    #title-input{font-size:18px;font-weight:700;font-family:var(--font-serif);}
    #body-input{min-height:320px;font-size:14px;line-height:1.8;}

    /* Cover upload */
    .upload-area{border:2px dashed var(--line);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;position:relative;transition:all var(--t-fast);}
    .upload-area:hover{border-color:var(--accent);background:#fff5f3;}
    .upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;}
    .upload-area svg{width:30px;height:30px;color:var(--muted-2);margin-bottom:8px;}
    .upload-area p{font-size:12px;color:var(--muted);}
    .img-preview{position:relative;border-radius:var(--radius);overflow:hidden;}
    .img-preview img{width:100%;height:160px;object-fit:cover;display:block;}
    .img-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
    .prog-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:10px;}
    .prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .2s;}

    /* Profile */
    .prof-grid{display:grid;grid-template-columns:260px 1fr;gap:24px;align-items:start;}
    .prof-card{background:var(--paper);border-radius:var(--radius-lg);box-shadow:var(--shadow);border:1px solid var(--line);padding:28px;text-align:center;}
    .prof-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 16px;display:block;border:3px solid var(--line);}
    .prof-name{font-family:var(--font-serif);font-size:20px;font-weight:700;margin-bottom:4px;}
    .prof-email{font-size:12px;color:var(--muted);margin-bottom:12px;}
    .prof-role{display:inline-block;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px;}
    .prof-meta{text-align:left;font-size:12px;color:var(--muted);border-top:1px solid var(--line);padding-top:16px;}
    .prof-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--line);}
    .prof-row:last-child{border-bottom:none;}
    .prof-val{color:var(--ink);font-weight:500;}
    .perms-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .perm-item{display:flex;align-items:center;gap:8px;font-size:12px;padding:8px 12px;background:var(--bg-2);border-radius:var(--radius);}
    .perm-item svg{width:14px;height:14px;flex-shrink:0;}
    .perm-yes{color:var(--green);}
    .perm-no{color:var(--muted-2);opacity:.5;}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--bg);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0);}
    .toast.success{background:var(--green);}
    .toast.error{background:var(--accent);}

    /* Spinner */
    .spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;}
    .modal-bg.open{display:flex;}
    .modal{background:var(--paper);border-radius:var(--radius-lg);padding:28px;max-width:380px;width:90%;box-shadow:var(--shadow-md);}
    .modal h3{font-size:16px;margin-bottom:8px;}
    .modal p{font-size:13px;color:var(--muted);margin-bottom:20px;}
    .modal-acts{display:flex;gap:10px;justify-content:flex-end;}

    /* Theme toggle */
    .theme-btn{background:none;border:1px solid var(--line);border-radius:var(--radius);padding:6px 8px;cursor:pointer;color:var(--muted);display:flex;align-items:center;}
    .theme-btn:hover{color:var(--ink);}

    /* Hidden by permission */
    .perm-hide{display:none!important;}

    @media(max-width:900px){
      .ed-layout{grid-template-columns:1fr;} .ed-side{position:static;}
      .art-cols{grid-template-columns:1fr 80px 80px;}
      .art-cols>*:nth-child(3),.art-cols>*:nth-child(4){display:none;}
      .prof-grid{grid-template-columns:1fr;}
    }
    @media(max-width:600px){
      .sidebar{transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
      .sidebar.open{transform:none;}
      .main{margin-left:0;}
    }
  </style>
</head>
<body>

<!-- ══ GATE (loading) ══ -->
<div id="screen-gate" class="screen active">
  <div class="inner">
    <div class="gate-logo"><span>SAU</span> NEWS</div>
    <div class="gate-spin"></div>
  </div>
</div>

<!-- ══ LOGIN ══ -->
<div id="screen-login" class="screen">
  <div class="login-card">
    <div class="login-logo"><span>SAU</span> NEWS</div>
    <p class="login-sub">Sign in to access the dashboard</p>
    <button class="btn-google" id="btn-google">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
    <p class="login-err" id="login-err"></p>
  </div>
</div>

<!-- ══ UNAUTHORIZED ══ -->
<div id="screen-unauth" class="screen">
  <div class="unauth-card">
    <div class="unauth-icon">🔒</div>
    <h2>Access Restricted</h2>
    <p id="unauth-msg">Your account doesn't have dashboard access. Contact the Super Admin.</p>
    <button class="btn btn-secondary" id="btn-unauth-out">Sign out &amp; use another account</button>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo"><span>SAU</span> NEWS<small id="panel-label">Dashboard</small></div>
    <nav class="sb-nav">
      <div class="nav-label">Content</div>
      <button class="nav-item active" data-view="dashboard" data-perm="panel.dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
      </button>
      <button class="nav-item" data-view="articles" data-perm="panel.articles">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Articles
      </button>
      <button class="nav-item" data-view="new-article" data-perm="panel.new_article">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>New Article
      </button>
      <button class="nav-item" data-view="comments" data-perm="panel.comments">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Comments
      </button>
      <div class="nav-label" data-perm="panel.analytics">Analytics</div>
      <button class="nav-item" data-view="analytics" data-perm="panel.analytics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Analytics
      </button>
      <div class="nav-label" data-perm="panel.users">Administration</div>
      <button class="nav-item" data-view="users" data-perm="panel.users">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Users
      </button>
      <button class="nav-item" data-view="settings" data-perm="panel.settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings
      </button>
      <div class="nav-label">Account</div>
      <button class="nav-item" data-view="profile">

        </button>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New Article

<div class="modal-bg" id="del-modal">
  <div class="modal">

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/cloudinary.js"></script>
<script src="js/auth.js"></script>
<script>
/* ════════════════════════════════════════════════
   SCREEN MANAGER
   Only one screen or the app is visible at a time.
════════════════════════════════════════════════ */
const SCREENS = ['screen-gate','screen-login','screen-unauth'];

function showScreen(id) {
  SCREENS.forEach(s => document.getElementById(s).classList.remove('active'));
  document.getElementById('app').classList.remove('on');
  if (id === 'app') {
    document.getElementById('app').classList.add('on');
  } else {
    document.getElementById(id).classList.add('active');
  }
}

/* ════════════════════════════════════════════════
   AUTH BOOTSTRAP — driven entirely by SAU.auth
════════════════════════════════════════════════ */
const CATEGORIES = ['Campus','Bangladesh','Satire','Opinion','Tech','Sports','Culture','Feature'];
const ROLE_COLORS = {
  super_admin:{bg:'#fde8e4',color:'#c0341a'},
  admin      :{bg:'#e8f0fa',color:'#1a5fa0'},
  editor     :{bg:'#d4f0de',color:'#1a7a3a'},
  journalist :{bg:'#f0e8fa',color:'#6a3a9a'},
  moderator  :{bg:'#fef9e0',color:'#8a6000'},
};

let DB          = null;
let curUser     = null;
let curProfile  = null;
let editingId   = null;
let delTargetId = null;
let allArticles = [];
let allUsers    = [];
let coverUrl    = '';
let coverPubId  = '';

// ── This is the ONLY place we listen for auth state ──
SAU.auth.onAuthStateChanged((user, profile) => {
  if (!user) {
    // Signed out → show login
    showScreen('screen-login');
    return;
  }

  if (!profile) {
    // Signed in but no Firestore profile yet (very brief moment) — wait
    // auth.js will call again once profile is loaded
    return;
  }

  if (!profile.active || !SAU.auth.ROLES[profile.role]) {
    showScreen('screen-unauth');
    document.getElementById('unauth-msg').textContent =
      'Your account (' + profile.email + ') doesn\'t have dashboard access. Contact the Super Admin.';
    return;
  }

  // ✅ Authenticated + valid role
  curUser    = user;
  curProfile = profile;
  DB         = SAU.firebase.db;

  fillSidebar();
  applyPerms();
  showScreen('app');
  showView('dashboard');
});

/* ── Sidebar fill ── */
function fillSidebar() {
  const p = curProfile;
  const avatar = p.photoURL ||
    'https://ui-avatars.com/api/?name=' + encodeURIComponent(p.displayName||'U') + '&background=c0341a&color=fff';
  document.getElementById('sb-avatar').src  = avatar;
  document.getElementById('sb-name').textContent  = p.displayName || 'User';
  document.getElementById('sb-email').textContent = p.email;
  document.getElementById('panel-label').textContent = SAU.auth.roleInfo(p.role).label + ' Panel';
  const rb = document.getElementById('sb-role');
  const rc = ROLE_COLORS[p.role] || {bg:'#f0ebe0',color:'#6b6358'};
  rb.style.background = rc.bg;
  rb.style.color       = rc.color;
  rb.textContent       = SAU.auth.roleInfo(p.role).label;
}

/* ── Permission-based element visibility ── */
function applyPerms() {
  document.querySelectorAll('[data-perm]').forEach(el => {
    const ok = SAU.auth.can(el.dataset.perm);
    el.classList.toggle('perm-hide', !ok);
  });
}

/* ── Theme ── */
const htmlEl = document.documentElement;
const saved  = localStorage.getItem('sau-theme');
if (saved) htmlEl.setAttribute('data-theme', saved);
document.getElementById('theme-btn').addEventListener('click', () => {
  const dark = htmlEl.getAttribute('data-theme') === 'dark';
  htmlEl.setAttribute('data-theme', dark ? 'light' : 'dark');
  localStorage.setItem('sau-theme', dark ? 'light' : 'dark');
});

/* ── Sign in ── */
document.getElementById('btn-google').addEventListener('click', async () => {
  const btn = document.getElementById('btn-google');
  const err = document.getElementById('login-err');
  btn.innerHTML = '<span class="spin" style="border-top-color:var(--accent)"></span> Signing in…';
  btn.disabled  = true;
  err.textContent = '';
  try {
    await SAU.auth.signIn();
    // onAuthStateChanged will handle the rest
  } catch(e) {
    err.textContent = e.message || 'Sign in failed.';
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Sign in with Google';
    btn.disabled = false;
  }
});

/* ── Sign out ── */
async function doSignOut() {
  await SAU.auth.signOut();
  // onAuthStateChanged fires → showScreen('screen-login')
}
document.getElementById('btn-signout').addEventListener('click', doSignOut);
document.getElementById('btn-unauth-out').addEventListener('click', doSignOut);

/* ── Toast ── */
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = 'toast'; }, 3200);
}

/* ════════════════════════════════════════════════
   NAV ROUTING
════════════════════════════════════════════════ */
document.querySelectorAll('[data-view]').forEach(el => {
  el.addEventListener('click', () => {
    const v    = el.dataset.view;
    const perm = 'panel.' + v.replace('-','_');
    if (SAU.auth.PERMISSIONS[perm] && !SAU.auth.can(perm)) {
      toast('No permission for this section.','error');
      return;
    }
    showView(v);
  });
});

function showView(v) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const active = document.querySelector(`.nav-item[data-view="${v}"]`);
  if (active) active.classList.add('active');
  const titles = {dashboard:'Dashboard',articles:'Articles','new-article':'New Article',comments:'Comments',analytics:'Analytics',users:'Users',settings:'Settings',profile:'My Profile'};
  document.getElementById('topbar-title').textContent = titles[v] || v;
  const c = document.getElementById('content');
  if      (v==='dashboard')   renderDashboard(c);
  else if (v==='articles')    renderArticles(c);
  else if (v==='new-article') { editingId=null; renderEditor(c,null); }
  else if (v==='comments')    renderComments(c);
  else if (v==='analytics')   renderAnalytics(c);
  else if (v==='users')       renderUsers(c);
  else if (v==='settings')    renderSettings(c);
  else if (v==='profile')     renderProfile(c);
}

/* ════════════════════════════════════════════════
   VIEWS
════════════════════════════════════════════════ */

/* Dashboard */
async function renderDashboard(c) {
  c.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Published</div><div class="stat-val" id="s-pub">—</div><div class="stat-sub">Articles live</div></div>
      <div class="stat-card"><div class="stat-label">Drafts</div><div class="stat-val" id="s-draft">—</div><div class="stat-sub">Unpublished</div></div>
      <div class="stat-card"><div class="stat-label">Total Views</div><div class="stat-val" id="s-views">—</div><div class="stat-sub">All time</div></div>
      <div class="stat-card" id="s-users-card"><div class="stat-label">Team Members</div><div class="stat-val" id="s-users">—</div><div class="stat-sub">Active accounts</div></div>
    </div>
    <div class="card">
      <div class="card-hd">Recent Articles</div>
      <div class="card-bd" id="recent-list">Loading…</div>
    </div>`;

  if (!SAU.auth.can('users.view')) {
    document.getElementById('s-users-card').style.display = 'none';
  }

  try {
    const snap = await DB.collection('articles').orderBy('createdAt','desc').limit(5).get();
    let pub=0,draft=0,views=0,rows='';
    snap.docs.forEach(d => {
      const a = d.data();
      if (a.status==='published') pub++; else draft++;
      views += (a.views||0);
      const date = a.createdAt?.toDate ? a.createdAt.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
      rows += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)">
        <div><div style="font-size:13px;font-weight:600">${esc(a.title||'Untitled')}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${date} · ${esc(a.authorName||'')}</div></div>
        <span class="badge badge-${a.status||'draft'}">${a.status||'draft'}</span>
      </div>`;
    });
    document.getElementById('s-pub').textContent   = pub;
    document.getElementById('s-draft').textContent = draft;
    document.getElementById('s-views').textContent = views.toLocaleString();
    document.getElementById('recent-list').innerHTML = rows || '<p class="empty">No articles yet.</p>';

    if (SAU.auth.can('users.view')) {
      const usnap = await DB.collection('users').get();
      document.getElementById('s-users').textContent = usnap.size;
    }
  } catch(e) {
    document.getElementById('recent-list').innerHTML = '<p style="color:var(--accent);font-size:13px">Error: ' + e.message + '</p>';
  }
}

/* Articles */
async function renderArticles(c) {
  c.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="font-size:15px;font-weight:700">All Articles</h2>
      <input type="text" id="art-q" placeholder="Search…" style="width:220px;font-size:13px">
    </div>
    <div class="tbl">
      <div class="tbl-head art-cols"><div>Title</div><div>Author</div><div>Category</div><div>Date</div><div>Actions</div></div>
      <div id="art-rows"><p class="empty">Loading…</p></div>
    </div>`;

  try {
    let q = DB.collection('articles').orderBy('createdAt','desc');
    if (curProfile.role==='journalist') {
      q = DB.collection('articles').where('authorEmail','==',curProfile.email).orderBy('createdAt','desc');
    }
    const snap = await q.get();
    allArticles = snap.docs.map(d=>({id:d.id,...d.data()}));
    paintArticles(allArticles);
    document.getElementById('art-q').addEventListener('input', e => {
      const s = e.target.value.toLowerCase();
      paintArticles(allArticles.filter(a=>(a.title||'').toLowerCase().includes(s)));
    });
  } catch(e) {
    document.getElementById('art-rows').innerHTML = '<p class="empty">Error: ' + e.message + '</p>';
  }
}

function paintArticles(list) {
  const el = document.getElementById('art-rows');
  if (!list.length) { el.innerHTML='<p class="empty">No articles found.</p>'; return; }
  el.innerHTML = list.map(a => {
    const canEdit = SAU.auth.can('articles.edit.any') || (SAU.auth.can('articles.edit.own') && a.authorEmail===curProfile.email);
    const canPub  = SAU.auth.can('articles.publish');
    const canDel  = SAU.auth.can('articles.delete');
    const date    = a.createdAt?.toDate ? a.createdAt.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
    return `<div class="tbl-row art-cols">
      <div class="cell-title">${esc(a.title||'Untitled')}<small>${esc(a.excerpt||'')}</small></div>
      <div style="font-size:12px">${esc(a.authorName||'—')}</div>
      <div><span class="badge" style="background:var(--bg-2)">${esc(a.category||'—')}</span></div>
      <div style="font-size:11px">${date}<br><span class="badge badge-${a.status||'draft'}">${a.status||'draft'}</span></div>
      <div class="row-actions">
        ${canEdit?`<button class="btn btn-secondary btn-sm" onclick="editArt('${a.id}')">Edit</button>`:''}
        ${canPub?`<button class="btn btn-sm ${a.status==='published'?'btn-secondary':'btn-success'}" onclick="togglePub('${a.id}','${a.status||'draft'}')">${a.status==='published'?'Unpub':'Publish'}</button>`:''}
        ${canDel?`<button class="btn btn-danger btn-sm" onclick="delConfirm('${a.id}')">Del</button>`:''}
      </div>
    </div>`;
  }).join('');
}

/* Comments */
function renderComments(c) {
  if (!SAU.auth.can('comments.moderate')) {
    c.innerHTML='<p class="empty">🔒 No permission.</p>'; return;
  }
  c.innerHTML=`<div class="card"><div class="card-hd">Comment Moderation</div><div class="card-bd"><p style="color:var(--muted);font-size:13px">Connect your comments collection here. Query: <code>DB.collection('comments').where('status','==','pending')</code></p></div></div>`;
}

/* Analytics */
async function renderAnalytics(c) {
  if (!SAU.auth.can('analytics.view')) { c.innerHTML='<p class="empty">🔒 No permission.</p>'; return; }
  c.innerHTML=`<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Total Articles</div><div class="stat-val" id="a1">—</div></div>
    <div class="stat-card"><div class="stat-label">Published</div><div class="stat-val" id="a2">—</div></div>
    <div class="stat-card"><div class="stat-label">Total Loves</div><div class="stat-val" id="a3">—</div></div>
    <div class="stat-card"><div class="stat-label">Total Views</div><div class="stat-val" id="a4">—</div></div>
  </div>`;
  try {
    const snap = await DB.collection('articles').get();
    let pub=0,loves=0,views=0;
    snap.docs.forEach(d=>{const a=d.data();if(a.status==='published')pub++;loves+=(a.loves||0);views+=(a.views||0);});
    document.getElementById('a1').textContent=snap.size;
    document.getElementById('a2').textContent=pub;
    document.getElementById('a3').textContent=loves.toLocaleString();
    document.getElementById('a4').textContent=views.toLocaleString();
  } catch(e){toast('Error: '+e.message,'error');}
}

/* Users */
async function renderUsers(c) {
  if (!SAU.auth.can('users.view')) { c.innerHTML='<p class="empty">🔒 No permission.</p>'; return; }
  c.innerHTML=`
    <div style="margin-bottom:20px"><h2 style="font-size:15px;font-weight:700">Team Members</h2></div>
    <div class="tbl">
      <div class="tbl-head usr-cols"><div></div><div>Member</div><div>Email</div><div>Role</div><div>Status</div></div>
      <div id="usr-rows"><p class="empty">Loading…</p></div>
    </div>`;
  try {
    allUsers = await SAU.auth.listUsers();
    paintUsers();
  } catch(e) {
    document.getElementById('usr-rows').innerHTML='<p class="empty">Error: '+e.message+'</p>';
  }
}

function paintUsers() {
  const el  = document.getElementById('usr-rows');
  const can = SAU.auth.can('users.role.assign');
  const opts= Object.keys(SAU.auth.ROLES).map(r=>`<option value="${r}">${SAU.auth.roleInfo(r).label}</option>`).join('');
  el.innerHTML = allUsers.map(u => {
    const av  = u.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(u.displayName||'U')}&background=c0341a&color=fff&size=32`;
    const self= u.uid===curUser.uid;
    const rc  = ROLE_COLORS[u.role]||{bg:'#f0ebe0',color:'#6b6358'};
    return `<div class="tbl-row usr-cols" id="ur-${u.uid}">
      <div><img src="${esc(av)}" style="width:32px;height:32px;border-radius:50%;object-fit:cover"></div>
      <div style="font-size:13px;font-weight:600">${esc(u.displayName||'—')}${self?' <span style="font-size:10px;color:var(--muted)">(you)</span>':''}</div>
      <div style="font-size:11px;color:var(--muted)">${esc(u.email||'—')}</div>
      <div>${can&&!self
        ?`<select style="padding:4px 8px;border-radius:var(--radius);border:1.5px solid var(--line);background:var(--bg);font-size:12px;font-family:inherit" onchange="changeRole('${u.uid}',this.value)">${opts}</select>`
        :`<span style="display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;background:${rc.bg};color:${rc.color}">${SAU.auth.roleInfo(u.role).label}</span>`
      }</div>
      <div style="font-size:11px;color:${u.active===false?'var(--accent)':'var(--green)'}">${u.active===false?'Inactive':'Active'}</div>
    </div>`;
  }).join('');
  // Pre-select role in dropdowns
  allUsers.forEach(u => {
    const sel = document.querySelector(`#ur-${u.uid} select`);
    if (sel) sel.value = u.role||'journalist';
  });
}

async function changeRole(uid, role) {
  try {
    await SAU.auth.assignRole(uid, role);
    const i = allUsers.findIndex(u=>u.uid===uid);
    if (i!==-1) allUsers[i].role = role;
    toast('Role updated ✓','success');
  } catch(e) { toast('Failed: '+e.message,'error'); }
}

/* Settings */
function renderSettings(c) {
  if (!SAU.auth.can('config.edit')) { c.innerHTML='<p class="empty">🔒 No permission.</p>'; return; }
  c.innerHTML=`<div class="card" style="max-width:560px">
    <div class="card-hd">Site Settings</div>
    <div class="card-bd">
      <div class="fg"><label>Site Name</label><input type="text" id="cfg-name" value="Aesthetic SAU News"></div>
      <div class="fg"><label>Tagline</label><input type="text" id="cfg-tag" value="News, Notes &amp; Nonsense from Bangladesh"></div>
      <div class="fg"><label>Contact Email</label><input type="text" id="cfg-email" value=""></div>
      <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
    </div>
  </div>`;
  DB.collection('siteConfig').doc('general').get().then(s=>{
    if(!s.exists) return;
    const d=s.data();
    if(d.siteName) document.getElementById('cfg-name').value=d.siteName;
    if(d.tagline)  document.getElementById('cfg-tag').value=d.tagline;
    if(d.email)    document.getElementById('cfg-email').value=d.email;
  });
}
async function saveSettings() {
  await DB.collection('siteConfig').doc('general').set({
    siteName:document.getElementById('cfg-name').value,
    tagline :document.getElementById('cfg-tag').value,
    email   :document.getElementById('cfg-email').value,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
    updatedBy:curUser.email,
  },{merge:true});
  toast('Settings saved ✓','success');
}

/* Profile */
function renderProfile(c) {
  const p  = curProfile;
  const rc = ROLE_COLORS[p.role]||{bg:'#f0ebe0',color:'#6b6358'};
  const av = p.photoURL||`https://ui-avatars.com/api/?name=${encodeURIComponent(p.displayName||'U')}&background=c0341a&color=fff&size=80`;
  const joined = p.createdAt?.toDate ? p.createdAt.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '—';
  const last   = p.lastLogin?.toDate  ? p.lastLogin.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})  : '—';

  const perms=[
    ['articles.create','Create articles'],['articles.edit.any','Edit any article'],
    ['articles.publish','Publish articles'],['articles.delete','Delete articles'],
    ['comments.moderate','Moderate comments'],['users.view','View team'],
    ['users.manage','Manage users'],['users.role.assign','Assign roles'],
    ['analytics.view','View analytics'],['config.edit','Edit settings'],
  ];

  const permHtml = perms.map(([perm,label])=>{
    const yes = SAU.auth.can(perm,p.role);
    return `<div class="perm-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="${yes?'perm-yes':'perm-no'}">
        ${yes?'<polyline points="20 6 9 17 4 12"/>':'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'}
      </svg>
      <span style="${yes?'':'opacity:.45'}">${label}</span>
    </div>`;
  }).join('');

  c.innerHTML=`<div class="prof-grid">
    <div class="prof-card">
      <img class="prof-avatar" src="${esc(av)}" alt="">
      <div class="prof-name">${esc(p.displayName||'—')}</div>
      <div class="prof-email">${esc(p.email||'—')}</div>
      <span class="prof-role" style="background:${rc.bg};color:${rc.color}">${SAU.auth.roleInfo(p.role).label}</span>
      <div class="prof-meta">
        <div class="prof-row"><span>Joined</span><span class="prof-val">${joined}</span></div>
        <div class="prof-row"><span>Last login</span><span class="prof-val">${last}</span></div>
        <div class="prof-row"><span>Status</span><span class="prof-val" style="color:var(--green)">Active</span></div>
      </div>
      <button class="btn btn-secondary" style="width:100%;margin-top:16px" onclick="doSignOut()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
    <div class="card">
      <div class="card-hd">Your Permissions</div>
      <div class="card-bd"><div class="perms-grid">${permHtml}</div></div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════════
   EDITOR
════════════════════════════════════════════════ */
function renderEditor(c, art) {
  if (!SAU.auth.can('articles.create')) { c.innerHTML='<p class="empty">🔒 No permission to create articles.</p>'; return; }
  coverUrl   = art?.coverImage    || '';
  coverPubId = art?.coverPublicId || '';
  const canPub = SAU.auth.can('articles.publish');

  c.innerHTML=`<div class="ed-layout">
    <div class="ed-main">
      <div class="card"><div class="card-bd">
        <div class="fg"><label>Title</label><input type="text" id="t-title" placeholder="Headline…" value="${esc(art?.title||'')}"></div>
        <div class="fg"><label>Excerpt</label><textarea id="t-excerpt" rows="2" placeholder="Short summary…">${esc(art?.excerpt||'')}</textarea></div>
        <div class="fg"><label>Body</label><textarea id="t-body" id="body-input" style="min-height:320px;font-size:14px;line-height:1.8">${esc(art?.body||'')}</textarea></div>
      </div></div>
    </div>
    <div class="ed-side">
      <div class="card"><div class="card-hd">Publish</div><div class="card-bd" style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-secondary" id="btn-draft" onclick="saveArt('draft')">Save Draft</button>
        ${canPub
          ?`<button class="btn btn-success" id="btn-pub" onclick="saveArt('published')">Publish</button>`
          :`<p style="font-size:11px;color:var(--muted)">Drafts will be reviewed by an Editor before publishing.</p>`}
      </div></div>
      <div class="card"><div class="card-hd">Details</div><div class="card-bd">
        <div class="fg"><label>Category</label>
          <select id="t-cat">${CATEGORIES.map(cat=>`<option value="${cat}" ${art?.category===cat?'selected':''}>${cat}</option>`).join('')}</select>
        </div>
        <div class="fg"><label>Slug</label><input type="text" id="t-slug" placeholder="auto" value="${esc(art?.slug||'')}"></div>
        <div class="fg"><label>Tags (comma separated)</label><input type="text" id="t-tags" value="${esc((art?.tags||[]).join(', '))}"></div>
      </div></div>
      <div class="card"><div class="card-hd">Cover Image</div><div class="card-bd" id="cover-wrap">
        ${coverUrl
          ?`<div class="img-preview"><img src="${esc(coverUrl)}" alt=""><button class="img-remove" onclick="removeCover()">×</button></div>`
          :`<div class="upload-area"><input type="file" accept="image/*" id="cover-file"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><p>Click or drag to upload</p></div>`}
        <div id="cover-prog" style="display:none"><div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div></div>
      </div></div>
      ${art?`<div class="card"><div class="card-bd"><button class="btn btn-danger" style="width:100%" onclick="delConfirm('${art.id}')">Delete Article</button></div></div>`:''}
    </div>
  </div>`;

  // Auto slug
  const ti = document.getElementById('t-title');
  const si = document.getElementById('t-slug');
  if (!art) { ti.addEventListener('input',()=>{ if(!si.dataset.m) si.value=slugify(ti.value); }); }
  si.addEventListener('input',()=>{ si.dataset.m='1'; });

  // Cover file input
  const fi = document.getElementById('cover-file');
  if (fi) fi.addEventListener('change', async ()=>{
    if (!fi.files[0]) return;
    document.getElementById('cover-prog').style.display='block';
    try {
      const res = await SAU.cloudinary.upload(fi.files[0], pct=>{
        document.getElementById('prog-fill').style.width=pct+'%';
      });
      coverUrl   = res.url;
      coverPubId = res.publicId;
      document.getElementById('cover-wrap').innerHTML=`<div class="img-preview"><img src="${esc(coverUrl)}" alt=""><button class="img-remove" onclick="removeCover()">×</button></div>`;
      toast('Image uploaded ✓','success');
    } catch(e) { toast('Upload failed: '+e.message,'error'); document.getElementById('cover-prog').style.display='none'; }
  });
}

function removeCover() {
  coverUrl=''; coverPubId='';
  document.getElementById('cover-wrap').innerHTML=`<div class="upload-area"><input type="file" accept="image/*" id="cover-file"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><p>Click or drag to upload</p></div>`;
  const fi2 = document.getElementById('cover-file');
  if (fi2) fi2.addEventListener('change', async()=>{});
}

async function saveArt(status) {
  if (!SAU.auth.can('articles.create')) { toast('No permission','error'); return; }
  if (status==='published'&&!SAU.auth.can('articles.publish')) { toast('You cannot publish. Save as draft.','error'); return; }
  const title   = document.getElementById('t-title')?.value?.trim();
  const body    = document.getElementById('t-body')?.value?.trim();
  const excerpt = document.getElementById('t-excerpt')?.value?.trim();
  const cat     = document.getElementById('t-cat')?.value;
  const slug    = document.getElementById('t-slug')?.value?.trim()||slugify(title);
  const tags    = (document.getElementById('t-tags')?.value||'').split(',').map(t=>t.trim()).filter(Boolean);
  if (!title) { toast('Title is required','error'); return; }

  const btnId = status==='published'?'btn-pub':'btn-draft';
  const btn   = document.getElementById(btnId);
  const orig  = btn?.innerHTML;
  if (btn) { btn.innerHTML='<span class="spin"></span>'; btn.disabled=true; }

  const data = {
    title,body,excerpt,category:cat,tags,slug,status,
    coverImage:coverUrl||'',coverPublicId:coverPubId||'',
    authorName:curUser.displayName||'Staff',authorEmail:curUser.email,authorRole:curProfile.role,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
  };

  try {
    if (editingId) {
      await DB.collection('articles').doc(editingId).update(data);
    } else {
      data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
      data.views=0; data.loves=0;
      const ref = await DB.collection('articles').add(data);
      editingId = ref.id;
    }
    await DB.collection('siteConfig').doc('lastUpdated').set({timestamp:firebase.firestore.FieldValue.serverTimestamp(),by:curUser.email},{merge:true});
    toast(status==='published'?'Published ✓':'Draft saved ✓','success');
  } catch(e) { toast('Error: '+e.message,'error'); }
  finally { if(btn){btn.innerHTML=orig;btn.disabled=false;} }
}

async function togglePub(id, cur) {
  if (!SAU.auth.can('articles.publish')) { toast('No permission','error'); return; }
  const ns = cur==='published'?'draft':'published';
  try {
    await DB.collection('articles').doc(id).update({status:ns,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
    const i=allArticles.findIndex(a=>a.id===id);
    if(i!==-1) allArticles[i].status=ns;
    paintArticles(allArticles);
    toast(ns==='published'?'Published ✓':'Moved to draft','success');
  } catch(e){toast('Error: '+e.message,'error');}
}

async function editArt(id) {
  editingId=id;
  document.getElementById('topbar-title').textContent='Edit Article';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const c=document.getElementById('content');
  c.innerHTML='<p class="empty">Loading…</p>';
  try {
    const snap=await DB.collection('articles').doc(id).get();
    if(!snap.exists){toast('Not found','error');return;}
    const art={id:snap.id,...snap.data()};
    if(curProfile.role==='journalist'&&art.authorEmail!==curProfile.email){
      c.innerHTML='<p class="empty">🔒 You can only edit your own articles.</p>'; return;
    }
    renderEditor(c,art);
  } catch(e){toast('Error: '+e.message,'error');}
}

function delConfirm(id) {
  if(!SAU.auth.can('articles.delete')){toast('No permission','error');return;}
  delTargetId=id;
  document.getElementById('del-modal').classList.add('open');
}
document.getElementById('del-cancel').addEventListener('click',()=>{
  document.getElementById('del-modal').classList.remove('open'); delTargetId=null;
});
document.getElementById('del-confirm').addEventListener('click', async()=>{
  if(!delTargetId) return;
  const btn=document.getElementById('del-confirm');
  btn.innerHTML='<span class="spin"></span>'; btn.disabled=true;
  try {
    await DB.collection('articles').doc(delTargetId).delete();
    document.getElementById('del-modal').classList.remove('open');
    toast('Deleted','success'); delTargetId=null;
    showView('articles');
  } catch(e){toast('Delete failed: '+e.message,'error');btn.innerHTML='Delete';btn.disabled=false;}
});

/* Helpers */
function slugify(t){return(t||'').toLowerCase().trim().replace(/[^\w\s-]/g,'').replace(/[\s_-]+/g,'-').replace(/^-+|-+$/g,'');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

window.editArt=editArt; window.delConfirm=delConfirm; window.togglePub=togglePub;
window.changeRole=changeRole; window.saveSettings=saveSettings;
window.removeCover=removeCover; window.doSignOut=doSignOut;
</script>
