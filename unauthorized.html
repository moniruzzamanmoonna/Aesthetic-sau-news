<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied — Aesthetic SAU News</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#f8f5ef;--paper:#fff;--ink:#12100d;--muted:#6b6358;--accent:#c0341a;--line:#e2ddd2;--radius:8px;--font-serif:'Playfair Display',Georgia,serif;--font-sans:'Inter',system-ui,sans-serif;}
    [data-theme="dark"]{--bg:#0e0c09;--paper:#1a1714;--ink:#f0e8d8;--muted:#9a9183;--accent:#e84c2b;--line:#2c2820;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{background:var(--paper);border-radius:12px;box-shadow:0 8px 32px -8px rgba(0,0,0,.18);border:1px solid var(--line);padding:56px 48px;text-align:center;max-width:440px;width:90%;}
    .lock{font-size:56px;margin-bottom:20px;}
    .logo{font-family:var(--font-serif);font-size:14px;font-weight:900;color:var(--accent);letter-spacing:-.3px;margin-bottom:24px;opacity:.6;}
    .logo span{color:var(--ink);}
    h1{font-family:var(--font-serif);font-size:28px;font-weight:900;margin-bottom:10px;}
    p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:28px;}
    .actions{display:flex;flex-direction:column;gap:10px;}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;border:none;transition:all .15s;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{opacity:.88;}
    .btn-secondary{background:none;color:var(--muted);border:1.5px solid var(--line);}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
    .role-info{margin-top:28px;padding:16px;background:var(--bg);border-radius:var(--radius);font-size:12px;color:var(--muted);border:1px solid var(--line);}
    .role-info strong{display:block;margin-bottom:4px;color:var(--ink);}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span>SAU</span> NEWS</div>
    <div class="lock">🔒</div>
    <h1>Access Denied</h1>
    <p id="msg">You don't have the necessary permissions to view this page. If you believe this is a mistake, contact your Super Admin.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">← Back to Homepage</a>
      <button class="btn btn-secondary" id="btn-signout">Sign out &amp; use different account</button>
    </div>
    <div class="role-info" id="role-info" style="display:none">
      <strong>Your current role</strong>
      <span id="role-display">—</span>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    SAU.auth.onAuthStateChanged((user, profile) => {
      if (profile && profile.role) {
        const roleNames = { super_admin:'Super Admin',admin:'Admin',editor:'Editor',journalist:'Journalist',moderator:'Moderator' };
        document.getElementById('role-info').style.display = 'block';
        document.getElementById('role-display').textContent = roleNames[profile.role] || profile.role;
      }
    });
    document.getElementById('btn-signout').addEventListener('click', async () => {
      await SAU.auth.signOut();
      window.location.href = '/admin.html';
    });
  </script>
</body>
</html>
